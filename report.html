<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="/auth.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週次レポート（リダイレクト）</title>
<script>
(function(){
  var params = new URLSearchParams(location.search);
  var week = params.get('week');
  if (week && /^\d{4}-w\d+$/.test(week)) {
    location.replace('/reports/' + week + '/');
  } else {
    location.replace('/reports/');
  }
})();
</script>
</head>
<body>
<p style="font-family:sans-serif;padding:40px">週次サマリーに移動しています…<br><a id="fallback" href="/reports/">/reports/ へ移動</a></p>
<script>
  var params = new URLSearchParams(location.search);
  var week = params.get('week');
  if (week && /^\d{4}-w\d+$/.test(week)) {
    document.getElementById('fallback').href = '/reports/' + week + '/';
    document.getElementById('fallback').textContent = '/reports/' + week + '/ へ移動';
  }
</script>
</body>
</html>
