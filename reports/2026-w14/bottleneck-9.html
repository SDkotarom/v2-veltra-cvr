<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="/auth.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#E8423F;--red-light:#FFF5F5;--bg:#f5f4f0;--card:#fff;--text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;--border:#e8e6e1;--border-dash:#d0cec8;--green:#16a34a;--green-light:#f0fdf4;--amber:#d97706;--amber-light:#fffbeb}
body{font-family:'Noto Sans JP','DM Sans',sans-serif;background:var(--bg);color:var(--text);padding:48px 32px;max-width:1200px;margin:0 auto;font-size:18px}
.card{background:var(--card);border-radius:16px;margin-bottom:28px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.header-band{background:var(--red);padding:24px 44px;display:flex;justify-content:space-between;align-items:center}
.header-band .logo{font-family:'DM Sans';font-weight:900;font-size:26px;color:#fff;letter-spacing:.04em;border:2px solid rgba(255,255,255,.6);padding:4px 14px;border-radius:5px}
.header-band .right{color:rgba(255,255,255,.8);font-size:14px}
.sec-label{padding:28px 44px 12px;font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.divider-solid{border:none;border-top:1px solid var(--border);margin:0}
.divider{border:none;border-top:1px dashed var(--border-dash);margin:0 44px}
.callout{background:var(--red-light);border-left:4px solid var(--red);padding:20px 28px;margin:0 44px 32px;border-radius:0 8px 8px 0}
.callout .ct{font-size:16px;font-weight:700;color:var(--red);margin-bottom:8px}
.callout .cb{font-size:16px;color:var(--text2);line-height:1.8}
.footer{padding:28px 44px;font-size:15px;color:var(--text3);display:flex;justify-content:space-between}
.bn-tag{font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.bn-tag.red{background:var(--red-light);border-color:var(--red);color:var(--red)}
.nav-bar{padding:16px 44px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
.nav-bar a{font-size:14px;color:var(--red);text-decoration:none;font-weight:600}
.nav-bar a:hover{text-decoration:underline}
.placeholder{padding:60px 44px;text-align:center;color:var(--text3)}
.placeholder .ph-icon{font-size:48px;margin-bottom:16px}
.placeholder .ph-title{font-size:20px;font-weight:700;color:var(--text2);margin-bottom:8px}
.placeholder .ph-desc{font-size:15px;line-height:1.7}
</style>
</head>
<body>

<div class="card">
  <div class="header-band">
    <div class="logo">V2</div>
    <a href="./" style="color:rgba(255,255,255,.85);font-size:14px;text-decoration:none;font-weight:500">← サマリーに戻る</a>
    <div class="right">ボトルネック #9 / 10</div>
  </div>

  <div style="padding:32px 44px">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
      <div style="font-family:'DM Sans';font-size:56px;font-weight:900;color:var(--red);line-height:1">#9</div>
      <div>
        <div style="font-size:22px;font-weight:900;margin-bottom:8px">Mobile × Organic × Europe — AC到達率</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span class="bn-tag red">①→② 回遊段階</span>
          <span class="bn-tag">Mobile / Organic / Europe</span>
        </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;margin-top:16px">
      <div style="font-size:12px;color:var(--text3);font-weight:700;text-transform:uppercase">全体平均との乖離</div>
      <div style="font-family:'DM Sans';font-size:36px;font-weight:900;color:var(--red)">-15%</div>
    </div>
  </div>

  <hr class="divider">


  <div class="proto-tabs-target"></div>

  <div style="padding:0 44px 32px">
    <div class="callout" style="margin:0">
      <div class="ct">主要仮説（暫定）</div>
      <div class="cb">Europeはエリア・都市・商品の階層が深く、カテゴリページから商品に到達するまでのステップが多い。</div>
    </div>
  </div>


  <div class="nav-bar">
    <a href="bottleneck-8.html">← #8 に戻る</a>
    <a href="./">サマリーに戻る</a>
    <a href="bottleneck-10.html">#10 へ進む →</a>
  </div>
</div>

<div class="card">
  <div class="footer">
    <span>VELTRA CVR改善チーム</span>
    <span><a href="https://analytics.google.com/analytics/web/#/p347074845/reports/reportinghub" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">GA4: 347074845</a>（仮想データ）</span>
    <span>2026-03-30</span>
  </div>
</div>

<script src="/prototype-tabs.js"></script>
<script src="/nav.js"></script>
<script src="/funnel-def.js"></script>
</body>
</html>
